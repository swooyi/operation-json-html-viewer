<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>전체 문항 HTML 뷰어</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'code'] }
    };
  </script>
  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <style>
    :root {
      color-scheme: light;
      --line: #d8dde6;
      --panel: #f4f6f8;
      --panel-strong: #e8edf3;
      --ink: #1f2933;
      --muted: #697586;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --answer-bg: #fff8e6;
      --note-bg: #eff6ff;
      --danger: #b42318;
      --nav-width: 32vw;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Segoe UI", sans-serif;
      color: var(--ink);
      background: #fff;
    }
    header {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    header h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
    }
    header span { color: var(--muted); font-size: 13px; white-space: nowrap; }
    .top-bar {
      flex-wrap: nowrap;
    }
    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
    }
    .load-button {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 10px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
    }
    .load-button:hover { background: #eef2f7; }
    .load-button:disabled {
      color: #98a2b3;
      cursor: default;
      background: #f2f4f7;
    }
    .load-button input { display: none; }
    .load-status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .load-status.error { color: var(--danger); font-weight: 700; }
    main {
      height: calc(100vh - 53px);
      display: grid;
      grid-template-columns: minmax(260px, var(--nav-width)) 6px minmax(0, 1fr);
      background: #fff;
    }
    nav {
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    .resizer {
      width: 6px;
      background: #eef2f7;
      border-right: 1px solid var(--line);
      cursor: col-resize;
      touch-action: none;
    }
    .resizer:hover,
    .resizer.dragging {
      background: #c7d2fe;
    }
    .filters {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      flex: 0 0 auto;
    }
    .search-input {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 7px 9px;
      font: inherit;
      background: #fff;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }
    .filter-row.primary {
      justify-content: space-between;
    }
    .filter-row.primary .image-toggle {
      flex: 1 1 0;
    }
    .result-count {
      color: var(--muted);
      font-size: 12px;
    }
    .image-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--ink);
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 5px 8px;
      background: #fff;
      font-weight: 700;
    }
    .image-toggle.active {
      border-color: #86efac;
      background: #dcfce7;
      color: #166534;
    }
    .image-toggle.compact {
      flex: 0 0 auto;
      padding: 4px 7px;
      font-size: 12px;
    }
    .image-size-control {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--ink);
      white-space: nowrap;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 4px 6px;
      background: #fff;
      font-size: 12px;
      font-weight: 700;
    }
    .image-size-control input {
      width: 72px;
    }
    .image-size-control.disabled {
      color: #98a2b3;
      background: #f2f4f7;
    }
    .image-size-control.disabled input {
      cursor: not-allowed;
    }
    .image-size-value {
      min-width: 34px;
      color: var(--muted);
      font-weight: 700;
      text-align: right;
    }
    .fold-actions {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      gap: 6px;
    }
    .filter-row.image-controls .image-size-control {
      flex: 1 1 auto;
      min-width: 150px;
    }
    .fold-button,
    .nav-button {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 5px 8px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      white-space: nowrap;
    }
    .fold-button:hover,
    .nav-button:hover:not(:disabled) { background: #eef2f7; }
    .nav-button:disabled {
      color: #98a2b3;
      cursor: default;
      background: #f2f4f7;
    }
    .tree {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 6px;
      padding: 10px 10px 24px;
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
      align-content: start;
    }
    details {
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    details details {
      border-width: 1px 0 0;
      border-radius: 0;
    }
    summary {
      cursor: pointer;
      padding: 8px 10px;
      background: var(--panel-strong);
      font-weight: 700;
      line-height: 1.35;
    }
    .section-summary {
      background: #fff;
      color: #344054;
      font-size: 13px;
    }
    .question-list {
      display: grid;
      gap: 2px;
      padding: 5px;
      background: #fff;
    }
    .question-node {
      width: 100%;
      border: 1px solid transparent;
      background: transparent;
      text-align: left;
      padding: 7px 8px 7px 20px;
      border-radius: 4px;
      cursor: pointer;
      color: var(--ink);
      font: inherit;
      font-size: 13px;
    }
    .question-node:hover { background: #eef2f7; }
    .question-node.active {
      background: var(--accent-soft);
      border-color: #93c5fd;
      color: #0f3f9c;
      font-weight: 700;
    }
    .question-node.has-image {
      background: #ecfdf3;
      border-color: #bbf7d0;
    }
    .question-node.has-image.active {
      background: #bbf7d0;
      border-color: #22c55e;
      color: #14532d;
    }
    .empty {
      padding: 18px;
      color: var(--muted);
      line-height: 1.6;
    }
    article {
      position: relative;
      z-index: 0;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
      padding: 0;
      display: flex;
      flex-direction: column;
      background: #fff;
    }
    .card-head {
      position: relative;
      z-index: 2;
      flex: 0 0 auto;
      padding: 22px 28px 14px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }
    .head-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }
    .head-nav {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .file-line {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: baseline;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
      line-height: 1.5;
    }
    .section-note {
      color: #475467;
    }
    .section-note::before {
      content: "·";
      margin-right: 6px;
      color: var(--muted);
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
    }
    .title-line {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .q-number {
      color: var(--accent);
      font-weight: 700;
      font-size: 18px;
    }
    .content-grid {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 16px;
      align-items: start;
      overflow: auto;
      flex: 1 1 auto;
      min-height: 0;
      padding: 22px 28px 40px;
      align-content: start;
      background: #fff;
    }
    .paired-row {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.72fr);
      gap: 16px;
      align-items: start;
    }
    section {
      min-width: 0;
    }
    h2 {
      font-size: 14px;
      margin: 0 0 8px;
      color: var(--muted);
    }
    .text-block {
      white-space: pre-wrap;
      line-height: 1.65;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      margin: 0;
      background: #fff;
      font-family: inherit;
      overflow-wrap: anywhere;
    }
    .answer-block {
      background: var(--answer-bg);
    }
    .note-block {
      border-color: #bfdbfe;
      background: var(--note-bg);
    }
    .block-list {
      display: grid;
      gap: 8px;
    }
    .block-item {
      white-space: pre-wrap;
      line-height: 1.65;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      background: #fff;
      overflow-wrap: anywhere;
    }
    .block-line + .block-line {
      margin-top: 6px;
    }
    .rendered-image {
      display: block;
      max-width: min(100%, var(--rendered-image-max-width, 200px));
      height: auto;
      margin: 8px 0;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
    }
    .missing-image {
      display: inline-block;
      margin: 4px 0;
      padding: 4px 7px;
      border: 1px solid #fecaca;
      border-radius: 4px;
      background: #fef2f2;
      color: #b42318;
      font-weight: 700;
    }
    .choice-list {
      padding-left: 34px;
    }
    .choice-list li {
      margin: 4px 0;
      padding-left: 4px;
    }
    .image-note-entry {
      border-top: 1px solid #bfdbfe;
      padding-top: 10px;
      margin-top: 10px;
    }
    .image-note-entry:first-child {
      border-top: 0;
      padding-top: 0;
      margin-top: 0;
    }
    .entry-index {
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
    }
    .note-row {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr);
      gap: 8px;
      margin: 6px 0;
    }
    .note-key {
      color: var(--muted);
      font-weight: 700;
    }
    .note-value {
      white-space: pre-wrap;
      min-width: 0;
      overflow-wrap: anywhere;
    }
    .note-heading-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .note-heading-row h2 {
      margin: 0;
    }
    .copy-button,
    .note-toggle-button {
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 3px 7px;
      background: #fff;
      color: #344054;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      font-weight: 700;
    }
    .copy-button:hover,
    .note-toggle-button:hover {
      background: #eef2f7;
    }
    @media (max-width: 860px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }
      main {
        height: auto;
        min-height: calc(100vh - 82px);
        grid-template-columns: 1fr;
      }
      .resizer {
        display: none;
      }
      nav {
        max-height: 38vh;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      article {
        padding: 0;
      }
      .card-head {
        padding: 18px 16px 14px;
      }
      .content-grid {
        padding: 18px 16px 32px;
      }
      .paired-row {
        grid-template-columns: 1fr;
      }
      .head-top {
        display: grid;
      }
      .head-nav {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <header class="top-bar">
    <h1>전체 문항 HTML 뷰어</h1>
    <div class="top-actions">
      <button id="folder-button" class="load-button" type="button">JSON 폴더 선택</button>
      <button id="restore-folder" class="load-button" type="button" disabled>최근 폴더 다시 열기</button>
      <input id="folder-input" type="file" accept=".json,application/json,image/png,image/jpeg,image/webp,image/gif,.png,.jpg,.jpeg,.webp,.gif" multiple webkitdirectory hidden>
      <span id="load-status" class="load-status">JSON 폴더를 선택해 주세요.</span>
      <span id="remember-status" class="load-status"></span>
    </div>
    <span id="count">파일 0개 / section 0개 / 문항 0개</span>
  </header>
  <main>
    <nav>
      <div class="filters">
        <input id="search" class="search-input" type="search" placeholder="문항 찾기">
        <div class="filter-row primary">
          <label id="image-toggle-label" class="image-toggle"><input id="image-only" type="checkbox"> 그림 있는 문항만</label>
          <label id="blocks-toggle-label" class="image-toggle"><input id="blocks-only" type="checkbox"> blocks 있는 문항만</label>
        </div>
        <div class="filter-row image-controls">
          <label id="render-image-toggle-label" class="image-toggle compact"><input id="render-images" type="checkbox"> 이미지 표시</label>
          <label id="image-size-control" class="image-size-control disabled">이미지 크기 <input id="image-size" type="range" min="100" max="500" step="20" value="200" disabled><span id="image-size-value" class="image-size-value">200px</span></label>
        </div>
        <div class="fold-actions">
          <button id="expand-all" class="fold-button" type="button">전체 펼치기</button>
          <button id="collapse-all" class="fold-button" type="button">전체 접기</button>
          <span id="result-count" class="result-count">0개 표시</span>
        </div>
      </div>
      <div id="nav-tree" class="tree"></div>
    </nav>
    <div id="resizer" class="resizer" role="separator" aria-label="좌측 패널 폭 조정"></div>
    <article id="card"></article>
  </main>
  <script>
    const IMAGE_TAG_PATTERN = /\[img(?:\s*:[^\]]*)?\]/i;
    const IMAGE_TAG_RENDER_PATTERN = /\[img\s*:\s*([^\]]+)\]/gi;
    const IMAGE_FILE_PATTERN = /\.(png|jpe?g|webp|gif)$/i;
    const STORAGE_KEYS = {
      recentSelection: 'allQuestionHtmlViewer.recentSelection',
      navWidth: 'allQuestionHtmlViewer.navWidth',
    };
    const DB_NAME = 'all-question-html-viewer';
    const DB_STORE = 'handles';
    const FOLDER_HANDLE_KEY = 'recent-folder';
    const MIN_NAV_WIDTH = 260;
    const MAX_NAV_WIDTH_RATIO = 0.6;
    let cards = [];
    let activeIndex = 0;
    let imageIndex = new Map();
    let imageObjectUrls = [];
    let imageNotesExpanded = false;
    let sharedContentScrollTop = 0;

    const folderInput = document.getElementById('folder-input');
    const folderButton = document.getElementById('folder-button');
    const restoreFolderButton = document.getElementById('restore-folder');
    const loadStatus = document.getElementById('load-status');
    const rememberStatus = document.getElementById('remember-status');
    const navTree = document.getElementById('nav-tree');
    const cardRoot = document.getElementById('card');
    const searchInput = document.getElementById('search');
    const imageOnlyInput = document.getElementById('image-only');
    const renderImagesInput = document.getElementById('render-images');
    const imageSizeControl = document.getElementById('image-size-control');
    const imageSizeInput = document.getElementById('image-size');
    const imageSizeValue = document.getElementById('image-size-value');
    const blocksOnlyInput = document.getElementById('blocks-only');
    const imageToggleLabel = document.getElementById('image-toggle-label');
    const renderImageToggleLabel = document.getElementById('render-image-toggle-label');
    const blocksToggleLabel = document.getElementById('blocks-toggle-label');
    const expandAllButton = document.getElementById('expand-all');
    const collapseAllButton = document.getElementById('collapse-all');
    const resizer = document.getElementById('resizer');
    const count = document.getElementById('count');
    const resultCount = document.getElementById('result-count');
    const openState = new Map();

    function clampNavWidth(width) {
      const maxWidth = Math.max(MIN_NAV_WIDTH, Math.floor(window.innerWidth * MAX_NAV_WIDTH_RATIO));
      return Math.min(Math.max(Math.round(width), MIN_NAV_WIDTH), maxWidth);
    }

    function setNavWidth(width, shouldSave = true) {
      const clamped = clampNavWidth(width);
      document.documentElement.style.setProperty('--nav-width', `${clamped}px`);
      if (shouldSave) {
        localStorage.setItem(STORAGE_KEYS.navWidth, String(clamped));
      }
    }

    function restoreNavWidth() {
      const saved = Number(localStorage.getItem(STORAGE_KEYS.navWidth));
      if (Number.isFinite(saved) && saved > 0) {
        setNavWidth(saved, false);
      }
    }

    function updateImageSize() {
      const size = Number(imageSizeInput.value) || 200;
      document.documentElement.style.setProperty('--rendered-image-max-width', `${size}px`);
      imageSizeValue.textContent = `${size}px`;
    }

    function updateImageSizeAvailability() {
      imageSizeInput.disabled = !renderImagesInput.checked;
      imageSizeControl.classList.toggle('disabled', !renderImagesInput.checked);
    }

    function saveSharedScrollPosition() {
      const content = cardRoot.querySelector('.content-grid');
      if (content) {
        sharedContentScrollTop = content.scrollTop;
      }
    }

    function restoreSharedScrollPosition() {
      const content = cardRoot.querySelector('.content-grid');
      if (content) {
        content.scrollTop = sharedContentScrollTop;
      }
    }

    function formatStats(fileCount, sectionCount, questionCount) {
      return `파일 ${fileCount}개 / section ${sectionCount}개 / 문항 ${questionCount}개`;
    }

    function saveRecentSelection(folderName, fileCount, sectionCount, questionCount) {
      const info = {
        folderName,
        fileCount,
        sectionCount,
        questionCount,
        savedAt: new Date().toISOString(),
      };
      localStorage.setItem(STORAGE_KEYS.recentSelection, JSON.stringify(info));
      renderRecentSelectionHint();
    }

    function renderRecentSelectionHint(extraMessage = '') {
      if (extraMessage) {
        rememberStatus.textContent = extraMessage;
        return;
      }
      const saved = localStorage.getItem(STORAGE_KEYS.recentSelection);
      if (!saved) {
        rememberStatus.textContent = '';
        return;
      }
      try {
        const info = JSON.parse(saved);
        rememberStatus.textContent = info.folderName ? `최근 폴더: ${info.folderName}` : '';
      } catch {
        rememberStatus.textContent = '';
      }
    }

    function supportsDirectoryPicker() {
      return typeof window.showDirectoryPicker === 'function';
    }

    function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = () => {
          request.result.createObjectStore(DB_STORE);
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveDirectoryHandle(handle) {
      const db = await openHandleDb();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(DB_STORE, 'readwrite');
        transaction.objectStore(DB_STORE).put(handle, FOLDER_HANDLE_KEY);
        transaction.oncomplete = () => resolve();
        transaction.onerror = () => reject(transaction.error);
      });
    }

    async function getDirectoryHandle() {
      const db = await openHandleDb();
      return new Promise((resolve, reject) => {
        const transaction = db.transaction(DB_STORE, 'readonly');
        const request = transaction.objectStore(DB_STORE).get(FOLDER_HANDLE_KEY);
        request.onsuccess = () => resolve(request.result || null);
        request.onerror = () => reject(request.error);
      });
    }

    async function ensureReadPermission(handle) {
      if (!handle || typeof handle.queryPermission !== 'function') {
        return false;
      }
      if ((await handle.queryPermission({ mode: 'read' })) === 'granted') {
        return true;
      }
      if (typeof handle.requestPermission === 'function') {
        return (await handle.requestPermission({ mode: 'read' })) === 'granted';
      }
      return false;
    }

    async function refreshRestoreFolderButton() {
      if (!supportsDirectoryPicker()) {
        restoreFolderButton.disabled = true;
        renderRecentSelectionHint('이 브라우저에서는 폴더 기억을 지원하지 않으면 다시 선택해 주세요.');
        return;
      }
      try {
        const handle = await getDirectoryHandle();
        restoreFolderButton.disabled = !handle;
        renderRecentSelectionHint(handle ? `최근 폴더: ${handle.name || '이름 없음'}` : '');
      } catch {
        restoreFolderButton.disabled = true;
        renderRecentSelectionHint('최근 폴더 정보를 읽지 못했습니다.');
      }
    }

    function isImageFile(file) {
      return IMAGE_FILE_PATTERN.test(file?.name || '');
    }

    function imageLookupKey(name) {
      return String(name || '')
        .trim()
        .replace(/^["']|["']$/g, '')
        .replace(/[\u200b-\u200d\ufeff]/g, '')
        .split(/[\\/]/)
        .pop()
        .normalize('NFC')
        .toLowerCase();
    }

    function imageLookupKeys(name) {
      const raw = String(name || '')
        .trim()
        .replace(/^["']|["']$/g, '')
        .replace(/[\u200b-\u200d\ufeff]/g, '')
        .replace(/\\/g, '/');
      const normalized = raw.normalize('NFC').toLowerCase();
      const base = imageLookupKey(raw);
      return [...new Set([normalized, base].filter(Boolean))];
    }

    function clearImageIndex() {
      imageObjectUrls.forEach((url) => URL.revokeObjectURL(url));
      imageObjectUrls = [];
      imageIndex = new Map();
    }

    function buildImageIndex(files) {
      clearImageIndex();
      files.filter(isImageFile).forEach((file) => {
        const url = URL.createObjectURL(file);
        imageObjectUrls.push(url);
        imageLookupKeys(file.viewerRelativePath || file.webkitRelativePath || file.name).forEach((key) => {
          if (!imageIndex.has(key)) {
            imageIndex.set(key, url);
          }
        });
      });
    }

    async function filesFromDirectoryHandle(handle, prefix = '') {
      const files = [];
      for await (const entry of handle.values()) {
        if (entry.kind === 'file') {
          const file = await entry.getFile();
          Object.defineProperty(file, 'viewerRelativePath', {
            value: `${prefix}${entry.name}`,
            configurable: true,
          });
          files.push(file);
        } else if (entry.kind === 'directory') {
          files.push(...await filesFromDirectoryHandle(entry, `${prefix}${entry.name}/`));
        }
      }
      return files;
    }

    async function loadDirectoryHandle(handle) {
      const granted = await ensureReadPermission(handle);
      if (!granted) {
        loadStatus.textContent = '최근 폴더 권한이 필요합니다. JSON 폴더 선택을 다시 눌러 주세요.';
        loadStatus.classList.add('error');
        return;
      }
      const files = await filesFromDirectoryHandle(handle);
      await loadFiles(files, handle.name || '폴더');
    }

    function setText(parent, className, text) {
      const node = document.createElement('div');
      node.className = className;
      node.textContent = text || '-';
      parent.appendChild(node);
      return node;
    }

    function addSection(parent, title, text, className = 'text-block') {
      const section = document.createElement('section');
      const heading = document.createElement('h2');
      heading.textContent = title;
      section.appendChild(heading);
      const body = document.createElement('div');
      body.className = className;
      appendTextWithImages(body, text || '-');
      section.appendChild(body);
      parent.appendChild(section);
    }

    function appendTextWithImages(parent, text) {
      const value = String(text || '-');
      if (!renderImagesInput.checked) {
        parent.textContent = value;
        return;
      }

      let cursor = 0;
      let matched = false;
      IMAGE_TAG_RENDER_PATTERN.lastIndex = 0;
      for (const match of value.matchAll(IMAGE_TAG_RENDER_PATTERN)) {
        matched = true;
        if (match.index > cursor) {
          parent.appendChild(document.createTextNode(value.slice(cursor, match.index)));
        }
        const fileName = match[1].trim();
        const imageUrl = imageLookupKeys(fileName).map((key) => imageIndex.get(key)).find(Boolean);
        if (imageUrl) {
          const image = document.createElement('img');
          image.className = 'rendered-image';
          image.src = imageUrl;
          image.alt = fileName;
          parent.appendChild(image);
        } else {
          const missing = document.createElement('span');
          missing.className = 'missing-image';
          missing.textContent = `이미지 없음: ${fileName}`;
          parent.appendChild(missing);
        }
        cursor = match.index + match[0].length;
      }
      if (!matched) {
        parent.textContent = value;
      } else if (cursor < value.length) {
        parent.appendChild(document.createTextNode(value.slice(cursor)));
      }
    }

    function blockDisplayValue(block) {
      if (block && typeof block === 'object' && !Array.isArray(block)) {
        for (const key of ['value', 'text', 'content']) {
          if (Object.prototype.hasOwnProperty.call(block, key)) {
            return displayValue(block[key]);
          }
        }
      }
      return displayValue(block);
    }

    function appendBlockContent(parent, block) {
      if (block && typeof block === 'object' && !Array.isArray(block) && Array.isArray(block.lines)) {
        block.lines.forEach((line) => {
          const lineNode = document.createElement('div');
          lineNode.className = 'block-line';
          appendTextWithImages(lineNode, displayValue(line));
          parent.appendChild(lineNode);
        });
        return;
      }
      appendTextWithImages(parent, blockDisplayValue(block));
    }

    function addBlocksSection(parent, blocks) {
      if (!hasDisplayValue(blocks)) {
        return;
      }
      const section = document.createElement('section');
      const heading = document.createElement('h2');
      heading.textContent = 'blocks';
      section.appendChild(heading);
      const list = document.createElement('div');
      list.className = 'block-list';
      const items = Array.isArray(blocks) ? blocks : [blocks];
      items.forEach((block) => {
        const item = document.createElement('div');
        item.className = 'block-item';
        appendBlockContent(item, block);
        list.appendChild(item);
      });
      section.appendChild(list);
      parent.appendChild(section);
    }

    function displayValue(value) {
      if (value === null || value === undefined || value === '') {
        return '-';
      }
      if (typeof value === 'string') {
        return value;
      }
      return JSON.stringify(value, null, 2);
    }

    function hasDisplayValue(value) {
      if (value === null || value === undefined) {
        return false;
      }
      if (typeof value === 'string') {
        return value.trim() !== '';
      }
      if (Array.isArray(value)) {
        return value.length > 0;
      }
      if (typeof value === 'object') {
        return Object.keys(value).length > 0;
      }
      return true;
    }

    function containsImageTag(value) {
      if (typeof value === 'string') {
        return IMAGE_TAG_PATTERN.test(value);
      }
      if (Array.isArray(value)) {
        return value.some((child) => containsImageTag(child));
      }
      if (value && typeof value === 'object') {
        return Object.values(value).some((child) => containsImageTag(child));
      }
      return false;
    }

    function formatIndexLabel(value) {
      const text = String(value ?? '').trim();
      if (/^\d+$/.test(text)) {
        return `[${String(Number(text)).padStart(2, '0')}]`;
      }
      return `[${text || '--'}]`;
    }

    function stringifyValue(value) {
      if (typeof value === 'string') {
        return value;
      }
      return JSON.stringify(value, null, 2);
    }

    function sectionLabel(sectionIndex, sectionTitle) {
      return `${formatIndexLabel(sectionIndex + 1)} ${sectionTitle || '-'}`;
    }

    function qNumberLabel(qNumber) {
      return `${String(qNumber || '-')}번`;
    }

    function buildCardsFromPayload(fileName, payload) {
      const result = [];
      const sections = Array.isArray(payload?.sections) ? payload.sections : [];
      sections.forEach((section, sectionIndex) => {
        if (!section || typeof section !== 'object') {
          return;
        }
        const items = Array.isArray(section.items) ? section.items : [];
        const sectionTitle = String(section.section_title ?? '');
        const sectionNote = String(section.note ?? '');
        items.forEach((item) => {
          if (!item || typeof item !== 'object') {
            return;
          }
          const question = item.question && typeof item.question === 'object' ? item.question : {};
          const imageEditNotes = item.image_edit_notes;
          const blocks = question.blocks ?? [];
          result.push({
            fileName,
            sectionIndex,
            sectionLabel: sectionLabel(sectionIndex, sectionTitle),
            sectionNote,
            qNumberLabel: qNumberLabel(item.q_number),
            stem: String(question.stem ?? ''),
            blocks: stringifyValue(blocks),
            rawBlocks: blocks,
            hasBlocks: hasDisplayValue(blocks),
            choices: item.choices ?? [],
            answerType: String(item.answer_type ?? ''),
            answer: stringifyValue(item.answer ?? ''),
            explanation: String(item.explanation ?? ''),
            imageEditNotes,
            hasImage: containsImageTag(item) || hasDisplayValue(imageEditNotes),
          });
        });
      });
      return result;
    }

    function countSections(payload) {
      return Array.isArray(payload?.sections) ? payload.sections.length : 0;
    }

    function folderNameFromFiles(files, fallback = '폴더') {
      const firstPath = files.find((file) => file.webkitRelativePath)?.webkitRelativePath || '';
      return firstPath ? firstPath.split('/')[0] : fallback;
    }

    const fileNameCollator = new Intl.Collator('ko', {
      numeric: true,
      sensitivity: 'base',
    });

    function fileSortKey(file) {
      return file.webkitRelativePath || file.name || '';
    }

    function sortJsonFiles(files) {
      return [...files].sort((left, right) => fileNameCollator.compare(fileSortKey(left), fileSortKey(right)));
    }

    async function loadFiles(fileList, folderName = '폴더') {
      const allFiles = Array.from(fileList);
      buildImageIndex(allFiles);
      const jsonFiles = sortJsonFiles(allFiles.filter((file) => file.name.toLowerCase().endsWith('.json')));
      const loadedCards = [];
      const errors = [];
      let sectionCount = 0;
      for (const file of jsonFiles) {
        try {
          const text = await file.text();
          const payload = JSON.parse(text);
          sectionCount += countSections(payload);
          loadedCards.push(...buildCardsFromPayload(file.name, payload));
        } catch (error) {
          errors.push(`${file.name}: ${error.message}`);
        }
      }
      cards = loadedCards;
      activeIndex = 0;
      openState.clear();
      searchInput.value = '';
      imageOnlyInput.checked = false;
      renderImagesInput.checked = false;
      blocksOnlyInput.checked = false;
      count.textContent = formatStats(jsonFiles.length, sectionCount, cards.length);
      saveRecentSelection(folderName, jsonFiles.length, sectionCount, cards.length);
      const imageCount = new Set(imageIndex.values()).size;
      const message = `${folderName} 폴더를 열었습니다. 이미지 ${imageCount}개를 찾았습니다.`;
      loadStatus.textContent = errors.length ? `${message} / 오류 ${errors.length}개` : message;
      loadStatus.classList.toggle('error', errors.length > 0);
      renderNav();
    }

    function searchText(data) {
      return [
        data.fileName,
        data.sectionLabel,
        data.sectionNote,
        data.qNumberLabel,
        data.stem,
        displayValue(data.blocks),
        displayValue(data.choices),
        data.answerType,
        data.answer,
        data.explanation,
        displayValue(data.imageEditNotes),
      ].join('\n').toLowerCase();
    }

    function addChoicesSection(parent, choices) {
      if (!Array.isArray(choices)) {
        addSection(parent, 'choices', displayValue(choices));
        return;
      }
      const section = document.createElement('section');
      const heading = document.createElement('h2');
      heading.textContent = 'choices';
      section.appendChild(heading);
      const list = document.createElement('ol');
      list.className = 'text-block choice-list';
      if (!choices.length) {
        const item = document.createElement('li');
        item.textContent = '-';
        list.appendChild(item);
      } else {
        choices.forEach((choice) => {
          const item = document.createElement('li');
          appendTextWithImages(item, displayValue(choice));
          list.appendChild(item);
        });
      }
      section.appendChild(list);
      parent.appendChild(section);
    }

    function imageFileNameFromValue(value) {
      const text = displayValue(value);
      const tagMatch = /\[img\s*:\s*([^\]]+)\]/i.exec(text);
      const rawName = tagMatch ? tagMatch[1] : text;
      const fileName = String(rawName || '').trim().replace(/^["']|["']$/g, '').split(/[\\/]/).pop();
      return fileName || '';
    }

    function imageStemFromValue(value) {
      const fileName = imageFileNameFromValue(value);
      return fileName.replace(/\.[^.]+$/, '');
    }

    async function copyText(text, button) {
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
        } else {
          const area = document.createElement('textarea');
          area.value = text;
          area.style.position = 'fixed';
          area.style.opacity = '0';
          document.body.appendChild(area);
          area.select();
          document.execCommand('copy');
          area.remove();
        }
        const original = button.textContent;
        button.textContent = '복사됨';
        setTimeout(() => { button.textContent = original; }, 900);
      } catch {
        const original = button.textContent;
        button.textContent = '복사 실패';
        setTimeout(() => { button.textContent = original; }, 1200);
      }
    }

    function addNoteRow(parent, key, value) {
      const row = document.createElement('div');
      row.className = 'note-row';
      const keyNode = document.createElement('div');
      keyNode.className = 'note-key';
      keyNode.textContent = key;
      const valueNode = document.createElement('div');
      valueNode.className = 'note-value';
      appendTextWithImages(valueNode, displayValue(value));
      if (key === 'image') {
        const stem = imageStemFromValue(value);
        if (stem) {
          const copyButton = document.createElement('button');
          copyButton.type = 'button';
          copyButton.className = 'copy-button';
          copyButton.textContent = '파일명 복사';
          copyButton.addEventListener('click', () => copyText(stem, copyButton));
          valueNode.appendChild(document.createTextNode(' '));
          valueNode.appendChild(copyButton);
        }
      }
      row.appendChild(keyNode);
      row.appendChild(valueNode);
      parent.appendChild(row);
    }

    function addImageNoteEntry(parent, entry, index) {
      const item = document.createElement('div');
      item.className = 'image-note-entry';
      if (index !== null) {
        const indexNode = document.createElement('div');
        indexNode.className = 'entry-index';
        indexNode.textContent = `#${index}`;
        item.appendChild(indexNode);
      }
      if (entry && typeof entry === 'object' && !Array.isArray(entry)) {
        const keys = Object.keys(entry);
        ['image', 'note'].forEach((key) => {
          if (Object.prototype.hasOwnProperty.call(entry, key)) {
            addNoteRow(item, key, entry[key]);
          }
        });
        keys.forEach((key) => {
          if (key !== 'image' && key !== 'note') {
            addNoteRow(item, key, entry[key]);
          }
        });
      } else {
        const valueNode = document.createElement('div');
        valueNode.className = 'note-value';
        appendTextWithImages(valueNode, displayValue(entry));
        item.appendChild(valueNode);
      }
      parent.appendChild(item);
    }

    function addImageEditNotesSection(parent, imageEditNotes) {
      if (!hasDisplayValue(imageEditNotes)) {
        return;
      }
      const section = document.createElement('section');
      const headingRow = document.createElement('div');
      headingRow.className = 'note-heading-row';
      const heading = document.createElement('h2');
      heading.textContent = 'image_edit_notes';
      const toggleButton = document.createElement('button');
      toggleButton.type = 'button';
      toggleButton.className = 'note-toggle-button';
      toggleButton.textContent = imageNotesExpanded ? '접기' : '펼치기';
      toggleButton.addEventListener('click', () => {
        imageNotesExpanded = !imageNotesExpanded;
        renderCard(activeIndex);
      });
      headingRow.appendChild(heading);
      headingRow.appendChild(toggleButton);
      section.appendChild(headingRow);
      if (!imageNotesExpanded) {
        parent.appendChild(section);
        return;
      }
      const body = document.createElement('div');
      body.className = 'text-block note-block';
      if (Array.isArray(imageEditNotes)) {
        if (!imageEditNotes.length) {
          body.textContent = '-';
        } else {
          imageEditNotes.forEach((entry, index) => addImageNoteEntry(body, entry, index + 1));
        }
      } else {
        addImageNoteEntry(body, imageEditNotes, null);
      }
      section.appendChild(body);
      parent.appendChild(section);
    }

    function setActiveQuestionNode() {
      document.querySelectorAll('.question-node').forEach((button) => {
        button.classList.toggle('active', Number(button.dataset.index) === activeIndex);
      });
    }

    function filteredIndexes() {
      const query = searchInput.value.trim().toLowerCase();
      const imageOnly = imageOnlyInput.checked;
      const blocksOnly = blocksOnlyInput.checked;
      return cards
        .map((data, index) => ({ data, index }))
        .filter((entry) => (
          (!imageOnly || entry.data.hasImage)
          && (!blocksOnly || entry.data.hasBlocks)
          && (!query || searchText(entry.data).includes(query))
        ))
        .map((entry) => entry.index);
    }

    function groupIndexes(indexes) {
      const files = new Map();
      indexes.forEach((index) => {
        const data = cards[index];
        if (!files.has(data.fileName)) {
          files.set(data.fileName, new Map());
        }
        const sections = files.get(data.fileName);
        const sectionKey = `${data.sectionIndex}::${data.sectionLabel}`;
        if (!sections.has(sectionKey)) {
          sections.set(sectionKey, { label: data.sectionLabel, items: [] });
        }
        sections.get(sectionKey).items.push(index);
      });
      return files;
    }

    function renderNav() {
      const indexes = filteredIndexes();
      resultCount.textContent = `${indexes.length}개 표시`;
      imageToggleLabel.classList.toggle('active', imageOnlyInput.checked);
      renderImageToggleLabel.classList.toggle('active', renderImagesInput.checked);
      updateImageSizeAvailability();
      blocksToggleLabel.classList.toggle('active', blocksOnlyInput.checked);
      navTree.replaceChildren();
      if (!cards.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = 'JSON 파일 또는 폴더를 선택해 주세요.';
        navTree.appendChild(empty);
        renderCard(null);
        return;
      }
      if (!indexes.length) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = '일치하는 문항이 없습니다.';
        navTree.appendChild(empty);
        renderCard(null);
        return;
      }

      const grouped = groupIndexes(indexes);
      grouped.forEach((sections, fileName) => {
        const fileKey = `file::${fileName}`;
        const fileDetails = document.createElement('details');
        fileDetails.dataset.key = fileKey;
        fileDetails.open = openState.has(fileKey) ? openState.get(fileKey) : true;
        fileDetails.addEventListener('toggle', () => openState.set(fileKey, fileDetails.open));
        const fileSummary = document.createElement('summary');
        fileSummary.textContent = fileName;
        fileDetails.appendChild(fileSummary);

        sections.forEach((section) => {
          const sectionKey = `section::${fileName}::${section.label}`;
          const sectionDetails = document.createElement('details');
          sectionDetails.dataset.key = sectionKey;
          sectionDetails.open = openState.has(sectionKey) ? openState.get(sectionKey) : true;
          sectionDetails.addEventListener('toggle', () => openState.set(sectionKey, sectionDetails.open));
          const sectionSummary = document.createElement('summary');
          sectionSummary.className = 'section-summary';
          sectionSummary.textContent = section.label;
          sectionDetails.appendChild(sectionSummary);

          const list = document.createElement('div');
          list.className = 'question-list';
          section.items.forEach((index) => {
            const data = cards[index];
            const button = document.createElement('button');
            button.type = 'button';
            button.className = 'question-node';
            button.dataset.index = String(index);
            button.classList.toggle('active', index === activeIndex);
            button.classList.toggle('has-image', data.hasImage);
            button.textContent = data.qNumberLabel;
            button.addEventListener('click', () => {
              activeIndex = index;
              renderCard(index);
              setActiveQuestionNode();
            });
            list.appendChild(button);
          });
          sectionDetails.appendChild(list);
          fileDetails.appendChild(sectionDetails);
        });
        navTree.appendChild(fileDetails);
      });

      if (!indexes.includes(activeIndex)) {
        activeIndex = indexes[0];
        renderCard(activeIndex);
      } else {
        renderCard(activeIndex);
      }
    }

    function currentFilteredPosition() {
      const indexes = filteredIndexes();
      return { indexes, position: indexes.indexOf(activeIndex) };
    }

    function moveBy(delta) {
      const { indexes, position } = currentFilteredPosition();
      const nextPosition = position + delta;
      if (nextPosition < 0 || nextPosition >= indexes.length) {
        return;
      }
      activeIndex = indexes[nextPosition];
      renderCard(activeIndex);
      setActiveQuestionNode();
      const activeNode = document.querySelector('.question-node.active');
      if (activeNode) {
        activeNode.scrollIntoView({ block: 'nearest' });
      }
    }

    function renderCard(index) {
      saveSharedScrollPosition();
      const data = index === null ? null : cards[index];
      cardRoot.replaceChildren();
      if (!data) {
        const empty = document.createElement('div');
        empty.className = 'empty';
        empty.textContent = cards.length ? '표시할 문항이 없습니다.' : 'JSON 파일 또는 폴더를 선택해 주세요.';
        cardRoot.appendChild(empty);
        return;
      }

      const { indexes, position } = currentFilteredPosition();
      const head = document.createElement('div');
      head.className = 'card-head';
      const headTop = document.createElement('div');
      headTop.className = 'head-top';
      const headInfo = document.createElement('div');
      const headNav = document.createElement('div');
      headNav.className = 'head-nav';
      const prevButton = document.createElement('button');
      prevButton.type = 'button';
      prevButton.className = 'nav-button';
      prevButton.textContent = '이전문항';
      prevButton.disabled = position <= 0;
      prevButton.addEventListener('click', () => moveBy(-1));
      const nextButton = document.createElement('button');
      nextButton.type = 'button';
      nextButton.className = 'nav-button';
      nextButton.textContent = '다음문항';
      nextButton.disabled = position < 0 || position >= indexes.length - 1;
      nextButton.addEventListener('click', () => moveBy(1));
      headNav.appendChild(prevButton);
      headNav.appendChild(nextButton);

      const fileLine = document.createElement('div');
      fileLine.className = 'file-line';
      setText(fileLine, 'file-name', data.fileName);
      if (data.sectionNote) {
        setText(fileLine, 'section-note', data.sectionNote);
      }
      headInfo.appendChild(fileLine);
      const titleLine = document.createElement('div');
      titleLine.className = 'title-line';
      setText(titleLine, 'section-title', data.sectionLabel);
      setText(titleLine, 'q-number', data.qNumberLabel);
      headInfo.appendChild(titleLine);
      headTop.appendChild(headInfo);
      headTop.appendChild(headNav);
      head.appendChild(headTop);
      cardRoot.appendChild(head);

      const content = document.createElement('div');
      content.className = 'content-grid';
      content.addEventListener('scroll', () => {
        sharedContentScrollTop = content.scrollTop;
      });
      cardRoot.appendChild(content);

      addImageEditNotesSection(content, data.imageEditNotes);
      addSection(content, '문제', data.stem);
      if (data.hasBlocks) {
        addBlocksSection(content, data.rawBlocks);
      }

      const pairedRow = document.createElement('div');
      pairedRow.className = 'paired-row';
      const choicesColumn = document.createElement('div');
      const answerColumn = document.createElement('div');
      pairedRow.appendChild(choicesColumn);
      pairedRow.appendChild(answerColumn);
      content.appendChild(pairedRow);
      addChoicesSection(choicesColumn, data.choices);
      addSection(answerColumn, 'answer_type', data.answerType, 'text-block answer-block');
      addSection(answerColumn, 'answer', data.answer, 'text-block answer-block');
      addSection(content, '해설', data.explanation);
      restoreSharedScrollPosition();
      requestAnimationFrame(restoreSharedScrollPosition);

      if (window.MathJax) {
        const typeset = () => window.MathJax.typesetPromise && window.MathJax.typesetPromise([cardRoot]).catch(() => {});
        if (window.MathJax.startup && window.MathJax.startup.promise) {
          window.MathJax.startup.promise.then(typeset).catch(() => {});
        } else {
          typeset();
        }
      }
    }

    folderButton.addEventListener('click', async () => {
      if (!supportsDirectoryPicker()) {
        folderInput.click();
        return;
      }
      try {
        const handle = await window.showDirectoryPicker({ mode: 'read' });
        await saveDirectoryHandle(handle);
        await refreshRestoreFolderButton();
        await loadDirectoryHandle(handle);
      } catch (error) {
        if (error && error.name === 'AbortError') {
          return;
        }
        loadStatus.textContent = `폴더 선택 중 오류가 발생했습니다: ${error.message}`;
        loadStatus.classList.add('error');
      }
    });
    folderInput.addEventListener('change', () => {
      const files = Array.from(folderInput.files || []);
      loadFiles(files, folderNameFromFiles(files));
    });
    restoreFolderButton.addEventListener('click', async () => {
      try {
        const handle = await getDirectoryHandle();
        if (!handle) {
          loadStatus.textContent = '기억된 폴더가 없습니다. JSON 폴더 선택을 눌러 주세요.';
          loadStatus.classList.add('error');
          return;
        }
        await loadDirectoryHandle(handle);
      } catch (error) {
        loadStatus.textContent = `최근 폴더를 열지 못했습니다: ${error.message}`;
        loadStatus.classList.add('error');
      }
    });
    searchInput.addEventListener('input', renderNav);
    imageOnlyInput.addEventListener('change', renderNav);
    renderImagesInput.addEventListener('change', () => {
      renderImageToggleLabel.classList.toggle('active', renderImagesInput.checked);
      updateImageSizeAvailability();
      renderCard(activeIndex);
    });
    imageSizeInput.addEventListener('input', () => {
      updateImageSize();
      if (renderImagesInput.checked) {
        renderCard(activeIndex);
      }
    });
    blocksOnlyInput.addEventListener('change', renderNav);
    expandAllButton.addEventListener('click', () => {
      document.querySelectorAll('details').forEach((details) => {
        details.open = true;
        const key = details.dataset.key;
        if (key) {
          openState.set(key, true);
        }
      });
    });
    collapseAllButton.addEventListener('click', () => {
      document.querySelectorAll('details').forEach((details) => {
        details.open = false;
        const key = details.dataset.key;
        if (key) {
          openState.set(key, false);
        }
      });
    });
    resizer.addEventListener('pointerdown', (event) => {
      if (window.matchMedia('(max-width: 860px)').matches) {
        return;
      }
      resizer.classList.add('dragging');
      resizer.setPointerCapture(event.pointerId);
      const move = (moveEvent) => setNavWidth(moveEvent.clientX);
      const up = () => {
        resizer.classList.remove('dragging');
        resizer.removeEventListener('pointermove', move);
        resizer.removeEventListener('pointerup', up);
        resizer.removeEventListener('pointercancel', up);
      };
      resizer.addEventListener('pointermove', move);
      resizer.addEventListener('pointerup', up);
      resizer.addEventListener('pointercancel', up);
    });
    window.addEventListener('resize', () => {
      const saved = Number(localStorage.getItem(STORAGE_KEYS.navWidth));
      if (Number.isFinite(saved) && saved > 0) {
        setNavWidth(saved, false);
      }
    });
    restoreNavWidth();
    updateImageSize();
    updateImageSizeAvailability();
    renderRecentSelectionHint();
    refreshRestoreFolderButton();
    renderNav();
  </script>
</body>
</html>
